<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZILA Staking</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<style>
body{font-family:Arial;background:#0b0b0f;color:white;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.pool{border:1px solid #333;border-radius:10px;padding:20px;margin:20px 0;background:#14141c}
button{padding:10px 20px;border:none;border-radius:6px;background:#7a5cff;color:white;cursor:pointer}
input{padding:10px;border-radius:6px;border:none;width:120px;margin-right:10px}
</style>
</head>
<body>
<div class="container">
<h1>ZILA STAKING</h1>
<button onclick="connectWallet()">Connect Wallet</button>
<p id="wallet"></p>

<div class="pool">
<h2>Pool 1 - Stake ZILA</h2>
<p>Earn ZILA</p>
<input id="zilaAmount" placeholder="Amount" />
<button onclick="stakeZila()">Stake</button>
</div>

<div class="pool">
<h2>Pool 2 - Stake USDT</h2>
<p>Earn ZILA</p>
<input id="usdtAmount" placeholder="Amount" />
<button onclick="stakeUSDT()">Stake</button>
</div>

<div class="pool">
<h2>Pool 3 - Stake ZILA-USDT LP</h2>
<p>Earn ZILA</p>
<input id="lpAmount" placeholder="Amount" />
<button onclick="stakeLP()">Stake</button>
</div>

</div>

<script>
let provider;
let signer;

const masterChefAddress = "YOUR_MASTERCHEF_CONTRACT";

const ABI = [
"function deposit(uint256 pid,uint256 amount) public"
];

async function connectWallet(){

await window.ethereum.request({method:"eth_requestAccounts"});

provider = new ethers.providers.Web3Provider(window.ethereum);

signer = provider.getSigner();

const address = await signer.getAddress();

document.getElementById("wallet").innerText = "Connected: " + address;

}

async function stakeZila(){

const amount = document.getElementById("zilaAmount").value;

const contract = new ethers.Contract(masterChefAddress,ABI,signer);

const tx = await contract.deposit(0,ethers.utils.parseUnits(amount,18));

await tx.wait();

alert("ZILA Staked");

}

async function stakeUSDT(){

const amount = document.getElementById("usdtAmount").value;

const contract = new ethers.Contract(masterChefAddress,ABI,signer);

const tx = await contract.deposit(1,ethers.utils.parseUnits(amount,18));

await tx.wait();

alert("USDT Staked");

}

async function stakeLP(){

const amount = document.getElementById("lpAmount").value;

const contract = new ethers.Contract(masterChefAddress,ABI,signer);

const tx = await contract.deposit(2,ethers.utils.parseUnits(amount,18));

await tx.wait();

alert("LP Staked");

}

</script>

</body>
</html>
