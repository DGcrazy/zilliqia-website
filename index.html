<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZILA AI DeFi Platform</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script><style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#04040a;
color:white;
overflow-x:hidden;
}

/* animated background */
.bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 30%,rgba(120,80,255,0.25),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,220,255,0.25),transparent 40%),
#04040a;
filter:blur(40px);
z-index:-1;
animation:movebg 12s infinite alternate ease-in-out;
}

@keyframes movebg{
0%{transform:translateY(0px)}
100%{transform:translateY(-60px)}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #16162a;
background:#060611;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
background:linear-gradient(90deg,#7a5cff,#00eaff);
-webkit-background-clip:text;
color:transparent;
}

button{
background:#6a5cff;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(120,90,255,0.7);
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#0c0c18;
padding:20px;
border-radius:14px;
border:1px solid #1c1c33;
box-shadow:0 0 20px rgba(120,80,255,0.15);
}

.card h3{
margin-top:0;
font-size:16px;
color:#aaa;
}

.big{
font-size:24px;
margin-top:10px;
}

.pool{
background:#0c0c18;
padding:20px;
border-radius:14px;
border:1px solid #1c1c33;
margin-bottom:20px;
}

.pool-title{
font-size:18px;
margin-bottom:8px;
}

.stats{
font-size:13px;
color:#aaa;
margin-bottom:12px;
}

input{
padding:10px;
border:none;
border-radius:8px;
margin-right:10px;
width:120px;
background:#111124;
color:white;
}

.actions button{
margin-right:6px;
margin-top:6px;
}

.footer{
text-align:center;
padding:30px;
color:#777;
font-size:13px;
}

</style></head><body><div class="bg"></div><header>
<div class="logo">ZILA AI</div>
<div>
<button onclick="connectWallet()">Connect Wallet</button>
<span id="wallet"></span>
</div>
</header><div class="container"><div class="dashboard"><div class="card">
<h3>Wallet Balance</h3>
<div class="big" id="walletBalance">0</div>
</div><div class="card">
<h3>ZILA Balance</h3>
<div class="big" id="zilaBalance">0</div>
</div><div class="card">
<h3>Total Value Locked</h3>
<div class="big" id="tvl">$0</div>
</div><div class="card">
<h3>Pending Rewards</h3>
<div class="big" id="rewards">0 ZILA</div>
<button onclick="claimReward()">Claim</button>
</div><div class="card">
<h3>Live APR</h3>
<div class="big" id="apr">0%</div>
</div></div><div class="pool">
<div class="pool-title">Pool 1 — Stake ZILA</div>
<div class="stats">Earn ZILA</div><input id="zilaAmount" placeholder="Amount" /><div class="actions">
<button onclick="stake(0,'zilaAmount')">Stake</button>
<button onclick="withdraw(0,'zilaAmount')">Withdraw</button>
</div>
</div><div class="pool">
<div class="pool-title">Pool 2 — Stake USDT</div>
<div class="stats">Earn ZILA</div><input id="usdtAmount" placeholder="Amount" /><div class="actions">
<button onclick="stake(1,'usdtAmount')">Stake</button>
<button onclick="withdraw(1,'usdtAmount')">Withdraw</button>
</div>
</div><div class="pool">
<div class="pool-title">Pool 3 — Stake ZILA‑USDT LP</div>
<div class="stats">Earn ZILA</div><input id="lpAmount" placeholder="Amount" /><div class="actions">
<button onclick="stake(2,'lpAmount')">Stake</button>
<button onclick="withdraw(2,'lpAmount')">Withdraw</button>
</div>
</div></div><div class="footer">
ZILA AI DeFi Platform
</div><script>

let provider;
let signer;

const masterChef = "YOUR_MASTERCHEF_CONTRACT";
const zilaToken = "YOUR_ZILA_TOKEN";

const chefABI=[
"function deposit(uint256,uint256)",
"function withdraw(uint256,uint256)",
"function pendingReward(uint256,address) view returns(uint256)"
];

const erc20ABI=[
"function balanceOf(address) view returns(uint256)"
];

async function connectWallet(){

await window.ethereum.request({method:'eth_requestAccounts'});

provider=new ethers.providers.Web3Provider(window.ethereum);

signer=provider.getSigner();

const address=await signer.getAddress();


document.getElementById("wallet").innerText=
address.slice(0,6)+"..."+address.slice(-4);

loadDashboard();

setInterval(loadDashboard,5000);

}

async function loadDashboard(){

const address=await signer.getAddress();

const balance=await provider.getBalance(address);

const eth=ethers.utils.formatEther(balance);


document.getElementById("walletBalance").innerText=
parseFloat(eth).toFixed(4);


const token=new ethers.Contract(zilaToken,erc20ABI,provider);

const zilaBal=await token.balanceOf(address);


document.getElementById("zilaBalance").innerText=
ethers.utils.formatUnits(zilaBal,18);


const apr=(Math.random()*120+30).toFixed(2);

document.getElementById("apr").innerText=apr+"%";


const tvl=(Math.random()*800000+200000).toFixed(0);

document.getElementById("tvl").innerText="$"+tvl;


const rewards=(Math.random()*50).toFixed(2);

document.getElementById("rewards").innerText=rewards+" ZILA";

}

async function stake(pid,inputId){

const amount=document.getElementById(inputId).value;

const contract=new ethers.Contract(masterChef,chefABI,signer);

const tx=await contract.deposit(pid,ethers.utils.parseUnits(amount,18));

await tx.wait();

alert("Stake success");

}

async function withdraw(pid,inputId){

const amount=document.getElementById(inputId).value;

const contract=new ethers.Contract(masterChef,chefABI,signer);

const tx=await contract.withdraw(pid,ethers.utils.parseUnits(amount,18));

await tx.wait();

alert("Withdraw success");

}

async function claimReward(){

alert("Connect claim function from MasterChef");

}

</script></body>
</html>
